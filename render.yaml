services:
  - type: web
    name: cleo-finance
    runtime: python
    buildCommand: pip install -r finances/requirements.txt && cd finances/frontend && npm install && npm run build
    startCommand: cd finances && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 20.11.0
      - key: APP_URL
        value: https://finances.cleo.ai.br
      - key: FRONTEND_URL
        value: https://finances.cleo.ai.br
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ALLOWED_EMAIL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
